site_name: Twistaway
site_description: Privacy-first motorcycle route planning and navigation
site_url: https://docs.twistaway.app/
repo_name: RadNotRed/twistaway
repo_url: https://github.com/RadNotRed/twistaway
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Development:
      - Commands: development/commands.md
      - Architecture: architecture/overview.md
      - Integrations: architecture/integrations.md
      - Security model: architecture/security.md
  - Deployment:
      - Overview: deployment/index.md
      - Docker and Cloudflare: deployment/docker.md
      - API hosting: deployment/hosting.md
  - Legal:
      - Privacy policy: legal/privacy-policy.md
      - Terms of service: legal/terms-of-service.md
      - Data security: legal/data-security.md
  - Credits: credits.md

copyright: Copyright &copy; 2026 Twistaway contributors
