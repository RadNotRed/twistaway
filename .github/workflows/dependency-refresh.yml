name: Dependency refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Update dependencies after successful checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install current Node dependencies
        run: bun install --frozen-lockfile

      - name: Install current Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Refresh Bun dependencies
        run: bun update

      - name: Refresh Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub upgrade --major-versions

      - name: Verify Node workspace
        run: |
          bun run build
          bun run test

      - name: Verify Flutter app
        working-directory: apps/mobile
        run: |
          flutter analyze
          flutter test
          flutter build web

      - name: Push refresh branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: automation/dependency-refresh
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json bun.lock apps/mobile/pubspec.yaml; then
            echo "No dependency changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add package.json bun.lock apps/mobile/pubspec.yaml
          git commit -m "chore: refresh dependencies"
          git push --force-with-lease origin "$BRANCH"

          if gh pr view "$BRANCH" --base main >/dev/null 2>&1; then
            gh pr edit "$BRANCH" \
              --base main \
              --title "chore: refresh dependencies" \
              --body "Automated dependency refresh. Node and Flutter builds/tests passed before this branch was pushed."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: refresh dependencies" \
              --body "Automated dependency refresh. Node and Flutter builds/tests passed before this branch was pushed."
          fi
