name: Build apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  flutter:
    name: Android and web
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
          pub-cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: >-
          flutter build apk --debug --no-pub
          --dart-define=TWISTAWAY_API_BASE_URL=https://api.twistaway.app

      - name: Build Flutter web app
        run: >-
          flutter build web --release --no-pub --no-wasm-dry-run
          --dart-define=TWISTAWAY_API_BASE_URL=https://api.twistaway.app

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: twistaway-android-debug-${{ github.sha }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: twistaway-web-${{ github.sha }}
          path: apps/mobile/build/web
          if-no-files-found: error
          retention-days: 14

  website-and-api:
    name: Website and API bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Upload website
        uses: actions/upload-artifact@v7
        with:
          name: twistaway-website-${{ github.sha }}
          path: apps/site/dist
          if-no-files-found: error
          retention-days: 14

      - name: Upload API bundle
        uses: actions/upload-artifact@v7
        with:
          name: twistaway-api-${{ github.sha }}
          path: |
            apps/api/dist
            apps/api/package.json
            packages/shared/dist
            packages/shared/package.json
            package.json
            bun.lock
          if-no-files-found: error
          retention-days: 14
