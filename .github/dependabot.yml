version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      node-dependencies:
        patterns: ["*"]

  - package-ecosystem: pub
    directory: /apps/mobile
    schedule:
      interval: weekly
      day: monday
    groups:
      flutter-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
      day: monday
    groups:
      documentation:
        patterns: ["*"]
