org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Reuse compiled Android plugin output and build independent modules concurrently.
org.gradle.caching=true
org.gradle.parallel=true
android.useAndroidX=true
# Some current Flutter plugins still compile their Android library code with Java 8.
# JDK 21 warns about that legacy target even though the app itself targets Java 17.
android.javaCompile.suppressSourceTargetDeprecationWarning=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
