name: twistaway_app
description: Privacy-first motorcycle route planner app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  flutter_secure_storage: ^10.2.0
  flutter_tts: ^4.2.3
  geolocator: ^14.0.2
  go_router: ^17.2.3
  latlong2: ^0.9.1
  sqflite_sqlcipher: ^3.2.0
  maplibre_gl: ^0.26.1
  http: ^1.6.0
  dynamic_color: ^1.8.1
  pointer_interceptor: 0.10.1+2
  url_launcher: ^6.3.2
  flutter_appauth: ^12.0.2
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/map_styles/
